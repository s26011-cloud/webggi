<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>성적에 이의 있으면 교무실</h1>
<hr>
<table border="2">
    <caption><b>3월 방과후 쪽지시험</b></caption>
    <thead>
        <tr>
            <th><b>이름</b></th>
            <th><b>수학점수</b></th>
            <th><b>과학점수</b></th>
            <th><b>사회점수</b></th>
        </tr>
    </thead>
    <tfoot>
        <tr>
            <th><b>평균</b></th>
            <th><b>65</b></th>
            <th><b>75</b></th>
            <th><b>80</b></th>
        </tr>
    </tfoot>
    <tbody>
        <tr>
            <td><b>김세연</b></td><td>55</td><td>75</td><td>90</td>
        </tr> <! td도 th로 바꾸면 진한글씨 가운데 정렬 적용됨>
        <tr>
            <td><b>도윤희</b></td><td>75</td><td>85</td><td><b><span style="color: rgb(255, 0, 0);">50</span></b></td>
        </tr>
        <tr>
            <td><b>박상규</b></td><td>80</td><td>65</td><td>100</td>
    
        </tr>
        <tr>
            <td><b>윤소희</b></td><td>70</td><td>90</td><td>80</td>

        </tr>
        <tr>
            <td><b>진태영</b></td><td>60</td><td>75</td><td>75</td>
        </tr>
        <tr>
            <td><b>황승찬</b></td><td><b><span style="color: rgb(255, 0, 0);">50</span></b></td><td>60</td><td>85</td>
        </tr>
    </tbody>
 </table>
 <hr>
 <td>추신</td>
 <br><br><td><mark>윤희</mark>랑 <mark>승찬</mark>이는</td>
 <br><td>성적 확인하는 <b>즉시</b> 교무실로...</td>
</body>
</html>
<! 표를 만들 때
   셀을 지정할 때
   th를 쓰면 강조
   td를 쓰면 일반>
