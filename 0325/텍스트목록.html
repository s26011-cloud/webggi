        가고싶은 나라 <br>

             <option value="나이지리아"></option>

        <br>
    
        보고싶은 것들<br>
        <input type="text" list="place"><br>
         <datalist id="place">
        <option value="밀림"></option>
        <option value="시장"></option>
        <option value="가게"></option>
        </datalist>



    </from>
</body>
